name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ["site/**"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install mkdocs-material mkdocs-glightbox
      - run: cd site && mkdocs gh-deploy --force
